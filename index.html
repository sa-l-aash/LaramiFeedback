<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest Feedback</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background: #fff;
    }

    .container {
      max-width: 520px;
      margin: auto;
    }

    .logo {
      width: 35%;
      max-width: 140px;
      height: auto;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      margin-bottom: 20px;
      color: #555;
      line-height: 1.4;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stars button {
      font-size: 32px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 10px;
      transition: transform 0.2s ease;
    }

    .stars button:hover {
      transform: scale(1.15);
    }

    .stars button:active {
      transform: scale(1.2);
    }

    #feedbackForm {
      display: none;
      margin-top: 20px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button.submit {
      margin-top: 10px;
      padding: 12px 18px;
      font-size: 14px;
      border: none;
      background: #000;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }

    button.submit:hover {
      opacity: 0.85;
    }

    #successMessage {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="LaramiLogo.png" alt="Larami House Logo" class="logo">

  <!-- TITLE -->
  <div class="title">
    Guest Feedback Form Larami House Narok 🏡
  </div>

  <div class="subtitle">
    Share your experience and help us improve.
  </div>

  <!-- QUESTION -->
  <h2>How was your experience?</h2>

  <!-- STARS -->
  <div class="stars">
    <button onclick="handleRating(1)">⭐</button>
    <button onclick="handleRating(2)">⭐</button>
    <button onclick="handleRating(3)">⭐</button>
    <button onclick="handleRating(4)">⭐</button>
    <button onclick="handleRating(5)">⭐</button>
  </div>

  <!-- FEEDBACK FORM -->
  <div id="feedbackForm">

    <h3>We're sorry we missed the mark.</h3>

    <p>Please tell us how we can improve.</p>

    <input
      type="text"
      id="guestName"
      placeholder="Your name (optional)"
    >

    <input
      type="text"
      id="room"
      placeholder="Room"
    >

    <textarea
      id="comment"
      rows="5"
      placeholder="Type your feedback here..."
    ></textarea>

    <button
      class="submit"
      onclick="submitFeedback()"
    >
      Submit Feedback
    </button>

  </div>

  <!-- SUCCESS MESSAGE -->
  <div id="successMessage">
    Thank you for your feedback 💚
  </div>

</div>

<script>

  let selectedRating = 0;

  function handleRating(rating) {

    selectedRating = rating;

    if (rating <= 3) {

      document.getElementById('feedbackForm').style.display = 'block';

    } else {

      window.location.href =
      "https://g.page/r/CVpS_cOBUCQjEBM/review";
    }
  }

  function submitFeedback() {

    const guestName =
      document.getElementById('guestName').value;

    const room =
      document.getElementById('room').value;

    const comment =
      document.getElementById('comment').value;

    // Show success instantly
    document.getElementById('feedbackForm').style.display = 'none';

    document.getElementById('successMessage').style.display = 'block';

    // Send data silently in background
    fetch("https://script.google.com/macros/s/AKfycbwHPfExoW5bmvx-r-1g1E8knKzk5I3qJWvuX701kh6D8q8CC_UlKf1MxbJohuR3bMKE7g/exec", {

      method: "POST",

      body: JSON.stringify({
        name: guestName,
        room: room,
        rating: selectedRating,
        feedback: comment
      })

    })

    .then(response => response.json())

    .then(data => {

      console.log("Feedback saved");

      document.getElementById('guestName').value = "";

      document.getElementById('room').value = "";

      document.getElementById('comment').value = "";

    })

    .catch(error => {

      console.error(error);

    });
  }

</script>

</body>
</html>
