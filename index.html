<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Larami House Feedback</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #fff;
      text-align: center;
    }

    .container {
      max-width: 520px;
      margin: auto;
    }

    .logo {
      width: 35%;
      max-width: 140px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    h2 {
      margin-bottom: 15px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    /* SOURCE GROUP IMPROVED */
    .source-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .source-group p {
      margin-bottom: 10px;
      font-weight: bold;
    }

    .source-option {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .source-option input {
      margin: 0;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
      margin-bottom: 20px;
    }

    .stars button {
      font-size: 34px;
      border: none;
      background: none;
      cursor: pointer;
      transition: transform 0.2s ease;
      padding: 5px;
    }

    .stars button:hover {
      transform: scale(1.15);
    }

    #feedbackForm {
      display: none;
      text-align: left;
      margin-top: 20px;
    }

    button.submit {
      width: 100%;
      padding: 14px;
      border: none;
      background: black;
      color: white;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button.submit:hover {
      opacity: 0.9;
    }

    #successMessage {
      display: none;
      margin-top: 25px;
      color: green;
      font-size: 16px;
      font-weight: bold;
    }

    /* RESPONSIVE TWEAKS */
    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .title {
        font-size: 20px;
      }

      .stars button {
        font-size: 30px;
      }
    }

  </style>

</head>

<body>

<div class="container">

  <img src="LaramiLogo.png" class="logo">

  <div class="title">Larami House Narok 🏡</div>
  <div class="subtitle">Share your experience and help us improve.</div>

  <input type="text" id="guestName" placeholder="Your name">

  <!-- SOURCE (RADIO ONLY ONE) -->
  <div class="source-group">
    <p>Where did you hear about us?</p>

    <label class="source-option">
      <input type="radio" name="source" value="TikTok">
      TikTok
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Instagram">
      Instagram
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Facebook">
      Facebook
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Booking.com">
      Booking.com
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Airbnb">
      Airbnb
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="YouTube">
      YouTube
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Google Maps">
      Google Maps
    </label>

    <label class="source-option">
      <input type="radio" name="source" value="Friend">
      Friend
    </label>

  </div>

  <h2>How was your experience?</h2>

  <div class="stars">
    <button onclick="handleRating(1)">⭐</button>
    <button onclick="handleRating(2)">⭐</button>
    <button onclick="handleRating(3)">⭐</button>
    <button onclick="handleRating(4)">⭐</button>
    <button onclick="handleRating(5)">⭐</button>
  </div>

  <div id="feedbackForm">
    <h3>We're sorry we missed the mark.</h3>
    <p>Please tell us how we can improve.</p>

    <input type="text" id="room" placeholder="Room">

    <textarea id="comment" rows="5" placeholder="Type your feedback here..."></textarea>

    <button class="submit" onclick="submitFeedback()">Submit Feedback</button>
  </div>

  <div id="successMessage">
    Thank you for your feedback 💚
  </div>

</div>

<script>

  let selectedRating = 0;

  function getSource() {
    const el = document.querySelector('input[name="source"]:checked');
    return el ? el.value : "";
  }

  function handleRating(rating) {

    selectedRating = rating;

    const guestName = document.getElementById('guestName').value;
    const source = getSource();

    if (rating <= 3) {
      document.getElementById('feedbackForm').style.display = 'block';
    }

    else {

      fetch("https://script.google.com/macros/s/AKfycbwHPfExoW5bmvx-r-1g1E8knKzk5I3qJWvuX701kh6D8q8CC_UlKf1MxbJohuR3bMKE7g/exec", {
        method: "POST",
        body: JSON.stringify({
          name: guestName,
          room: "",
          rating: rating,
          feedback: "",
          source: source
        })
      })

      .then(() => {
        window.location.href =
          "https://g.page/r/CVpS_cOBUCQjEBM/review";
      })

      .catch(() => {
        window.location.href =
          "https://g.page/r/CVpS_cOBUCQjEBM/review";
      });

    }
  }

  function submitFeedback() {

    const guestName = document.getElementById('guestName').value;
    const room = document.getElementById('room').value;
    const comment = document.getElementById('comment').value;
    const source = getSource();

    document.getElementById('feedbackForm').style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';

    fetch("https://script.google.com/macros/s/AKfycbwHPfExoW5bmvx-r-1g1E8knKzk5I3qJWvuX701kh6D8q8CC_UlKf1MxbJohuR3bMKE7g/exec", {
      method: "POST",
      body: JSON.stringify({
        name: guestName,
        room: room,
        rating: selectedRating,
        feedback: comment,
        source: source
      })
    });

  }

</script>

</body>
</html>
